spring.application.name=file-service
server.port=8082

# MySQL
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/talentconnect_files?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false

# Stockage local des fichiers
app.storage.location=${FILE_STORAGE_PATH:./data/uploads}
app.storage.max-size-mb=10

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

