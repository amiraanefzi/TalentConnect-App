spring.application.name=talentconnect-backend
server.port=8080
spring.datasource.url=jdbc:mysql://localhost:3306/talentconnect?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
app.jwt.secret=TalentConnect2024SecretKeyForJWTSigning
app.jwt.expiration=86400000
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
logging.level.com.talentconnect=DEBUG