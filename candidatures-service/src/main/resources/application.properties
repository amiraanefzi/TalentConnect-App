spring.application.name=candidatures-service
server.port=8081

# Dev database (H2). Replace datasource/driver/dialect with PostgreSQL or MySQL in prod.
spring.datasource.url=jdbc:h2:mem:candidaturesdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/{vendor}

# PostgreSQL example:
# spring.datasource.url=jdbc:postgresql://localhost:5432/candidatures_db
# spring.datasource.username=candidatures
# spring.datasource.password=candidatures
# spring.datasource.driver-class-name=org.postgresql.Driver

# MySQL example:
# spring.datasource.url=jdbc:mysql://localhost:3306/candidatures_db?useSSL=false&serverTimezone=UTC
# spring.datasource.username=candidatures
# spring.datasource.password=candidatures
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false
app.kafka.topics.candidate-applied=candidate.applied

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

app.clients.file-service.base-url=http://localhost:8082
