name: SonarCloud – Build, Test & Analyze

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  sonar:
    name: Build and Analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      # ── Build multi-module + tests ─────────────────────────────────
      - name: Build and Test
        run: ./mvnw -B clean verify --no-transfer-progress

      # ── Analyse SonarCloud (étape séparée pour la clarté) ──────────
      - name: SonarCloud Analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN:  ${{ secrets.SONAR_TOKEN }}
        run: |
          ./mvnw -B sonar:sonar --no-transfer-progress \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.organization=amiraanefzi \
            -Dsonar.projectKey=TalentConnect-App
