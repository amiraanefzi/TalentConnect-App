name: SonarCloud – Build, Test & Analyze

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  sonar:
    name: Build and Analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Java 21 (correspondant au parent pom) ──────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      # ── Build multi-module + tests + analyse Sonar ─────────────────
      - name: Build, Test & SonarCloud analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN:  ${{ secrets.SONAR_TOKEN }}
        run: >
          ./mvnw -B clean verify
          org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.organization=amiraanefzi
          -Dsonar.projectKey=TalentConnect-App
          -Dsonar.coverage.jacoco.xmlReportPaths=
            auth-service/target/site/jacoco/jacoco.xml,
            candidatures-service/target/site/jacoco/jacoco.xml,
            chatbot-service/target/site/jacoco/jacoco.xml,
            job-service/target/site/jacoco/jacoco.xml
