server.port=8081

# ---- Database (Auth Service / dev) ----
spring.datasource.url=jdbc:mysql://localhost:3306/talentconnect_auth?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# Keep data between restarts
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Kafka optional in dev
app.kafka.enabled=false

# ---- JWT (dev only – override APP_JWT_SECRET in prod) ----
app.jwt.secret=${APP_JWT_SECRET:dev-local-only-secret-change-in-prod-32ch}

# ---- Bootstrap admin (dev only) ----
app.bootstrap.admin.enabled=true
app.bootstrap.admin.email=${APP_BOOTSTRAP_ADMIN_EMAIL:admin@talentconnect.tn}
app.bootstrap.admin.password=${APP_BOOTSTRAP_ADMIN_PASSWORD:Admin@Dev123}

