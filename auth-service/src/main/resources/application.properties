spring.application.name=auth-service
server.port=8081

# ---- Database (MySQL default) ----
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/talentconnect_auth?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ---- OpenAPI / Swagger UI ----
#springdoc.swagger-ui.path=/swagger-ui.html

# ---- JWT ----
# Mandatory – set APP_JWT_SECRET env var (>= 32 chars) before starting
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-seconds=3600

# ---- Kafka ----
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
app.kafka.enabled=false
app.kafka.topics.user-created=user.created

# ---- Bootstrap admin user ----
app.bootstrap.admin.enabled=${APP_BOOTSTRAP_ADMIN_ENABLED:true}
app.bootstrap.admin.email=${APP_BOOTSTRAP_ADMIN_EMAIL:admin@talentconnect.tn}
# If blank, bootstrap is skipped (see BootstrapAdminConfig)
app.bootstrap.admin.password=${APP_BOOTSTRAP_ADMIN_PASSWORD:}
