server.port=8080

# In-memory profile for quick runs (no MySQL needed)
spring.datasource.url=jdbc:h2:mem:talen_job_dev;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driverClassName=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

# JWT secret (must match auth-service)
app.jwt.secret=${APP_JWT_SECRET:change-me-please-change-me-please-change-me-please}

