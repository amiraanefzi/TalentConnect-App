# ---- Job Service / dev profile ----
# Valeurs dev uniquement. En prod, override via env vars ou spring.profiles.active=prod

# Datasource
spring.datasource.url=jdbc:mysql://localhost:3306/talentconnect_jobs?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&zeroDateTimeBehavior=CONVERT_TO_NULL
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT (dev only – override APP_JWT_SECRET in prod)
app.jwt.secret=${APP_JWT_SECRET:dev-local-only-secret-change-in-prod-32ch}

