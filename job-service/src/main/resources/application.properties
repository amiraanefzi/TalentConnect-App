spring.application.name=job-service
server.port=8085

# Active le profil 'dev' par défaut (local). En prod, définir spring.profiles.active=prod
spring.profiles.default=dev

# Datasource (override via env vars in deployment)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/talentconnect_jobs?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&zeroDateTimeBehavior=CONVERT_TO_NULL}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# OpenAPI / Swagger
springdoc.api-docs.path=/v3/api-docs

# Mandatory – set APP_JWT_SECRET env var (>= 32 chars, must match auth-service)
app.jwt.secret=${APP_JWT_SECRET}
