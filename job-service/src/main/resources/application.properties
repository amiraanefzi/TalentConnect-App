spring.application.name=job-service

# Datasource (override via env vars in deployment)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/talentconnect_jobs?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# OpenAPI / Swagger
springdoc.api-docs.path=/v3/api-docs

# JWT (must match auth-service signing secret). Must be >= 32 bytes for HS256.
app.jwt.secret=${APP_JWT_SECRET:change-me-please-change-me-please-change-me-please}
