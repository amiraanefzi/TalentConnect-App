version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: talentconnect-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: talent_connect_chatbot
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - talentconnect-network

  chatbot-service:
    build: .
    container_name: chatbot-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/talent_connect_chatbot?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    ports:
      - "8083:8083"
    depends_on:
      - mysql
    networks:
      - talentconnect-network

volumes:
  mysql_data:

networks:
  talentconnect-network:
    driver: bridge

