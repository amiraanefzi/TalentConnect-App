<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentConnect - Chatbot RH</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            height: 600px;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid #667eea;
        }

        .chat-header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .chat-header p {
            font-size: 12px;
            opacity: 0.9;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 15px;
            border-radius: 10px;
            word-wrap: break-word;
            font-size: 14px;
        }

        .message.user .message-content {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 0;
        }

        .message.bot .message-content {
            background: #e8e8e8;
            color: #333;
            border-bottom-left-radius: 0;
        }

        .message-time {
            font-size: 11px;
            color: #999;
            margin-top: 5px;
            padding: 0 5px;
        }

        .chat-input-area {
            border-top: 1px solid #ddd;
            padding: 15px;
            background: white;
            display: flex;
            gap: 10px;
        }

        #message-input {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 25px;
            padding: 12px 15px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        #message-input:focus {
            border-color: #667eea;
        }

        #send-btn {
            background: #667eea;
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            transition: background 0.3s;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #send-btn:hover {
            background: #764ba2;
        }

        .status {
            text-align: center;
            padding: 10px;
            font-size: 12px;
            color: #999;
        }

        .typing {
            display: flex;
            gap: 4px;
            padding: 12px 15px;
        }

        .typing span {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.7;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>TalentConnect</h1>
            <p>Assistant RH & Carrière 💼</p>
        </div>

        <div class="chat-messages" id="chat-messages">
            <div class="status" id="connection-status">Connexion...</div>
        </div>

        <div class="chat-input-area">
            <input
                type="text"
                id="message-input"
                placeholder="Posez votre question..."
                autocomplete="off">
            <button id="send-btn" title="Envoyer">➤</button>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chat-messages');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const connectionStatus = document.getElementById('connection-status');

        let ws = null;
        const userId = 'user_' + Math.random().toString(36).substr(2, 9);
        const serverUrl = 'ws://localhost:8083/ws/chat';

        function connectWebSocket() {
            ws = new WebSocket(serverUrl);

            ws.onopen = () => {
                console.log('Connected to chatbot service');
                connectionStatus.textContent = 'Connecté ✓';
                connectionStatus.style.color = '#4caf50';
            };

            ws.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    displayMessage(msg.message, 'bot');
                } catch (e) {
                    console.error('Error parsing message:', e);
                }
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                connectionStatus.textContent = 'Erreur de connexion';
                connectionStatus.style.color = '#f44336';
            };

            ws.onclose = () => {
                console.log('Disconnected from chatbot service');
                connectionStatus.textContent = 'Déconnecté';
                connectionStatus.style.color = '#f44336';
                // Retry connection after 3 seconds
                setTimeout(connectWebSocket, 3000);
            };
        }

        function sendMessage() {
            const message = messageInput.value.trim();
            if (message === '' || !ws || ws.readyState !== WebSocket.OPEN) return;

            displayMessage(message, 'user');

            const chatMessage = {
                sender: 'user',
                message: message,
                userId: userId,
                timestamp: Date.now()
            };

            ws.send(JSON.stringify(chatMessage));
            messageInput.value = '';
            messageInput.focus();
        }

        function displayMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = text;

            const timeDiv = document.createElement('div');
            timeDiv.className = 'message-time';
            timeDiv.textContent = new Date().toLocaleTimeString();

            messageDiv.appendChild(contentDiv);
            messageDiv.appendChild(timeDiv);
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Event listeners
        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Initial connection
        connectWebSocket();
    </script>
</body>
</html>
