server.port=${CHATBOT_PORT:8083}
spring.application.name=chatbot-service

spring.datasource.url=${CHATBOT_DATASOURCE_URL:jdbc:mysql://localhost:3306/talent_connect_chatbot?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${CHATBOT_DATASOURCE_USERNAME:root}
spring.datasource.password=${CHATBOT_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${CHATBOT_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

logging.level.root=INFO
logging.level.tn.iteam.chatbotservice=${CHATBOT_LOG_LEVEL:INFO}

chatbot.cors.allowed-origins=${CHATBOT_ALLOWED_ORIGINS:http://localhost:4200}

# URL du job-service pour récupérer les vraies offres d'emploi
chatbot.job-service.base-url=${JOB_SERVICE_URL:http://localhost:8085}

