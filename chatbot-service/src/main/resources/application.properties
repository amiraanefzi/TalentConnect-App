# Server Configuration
server.port=8083
server.servlet.context-path=/
server.error.include-message=always

# Application Name
spring.application.name=chatbot-service

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/talent_connect_chatbot?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.root=INFO
logging.level.tn.iteam.chatbotservice=DEBUG
logging.level.org.springframework.web=DEBUG

# WebSocket Configuration
spring.websocket.enabled=true

