<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TalentConnect Chatbot</title>
    <style>
        :root {
            --ink: #17201b;
            --muted: #607068;
            --line: #d8e1dc;
            --paper: #fbf8ef;
            --panel: #ffffff;
            --accent: #0f766e;
            --accent-dark: #0b4f49;
            --bot: #eef6f1;
            --user: #0f766e;
            --danger: #b42318;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--ink);
            background:
                    linear-gradient(135deg, rgba(15, 118, 110, 0.14), transparent 36%),
                    linear-gradient(315deg, rgba(213, 166, 76, 0.18), transparent 40%),
                    var(--paper);
            font-family: Georgia, "Times New Roman", serif;
        }

        main {
            width: min(980px, calc(100vw - 32px));
            min-height: 100vh;
            margin: 0 auto;
            display: grid;
            grid-template-rows: auto 1fr auto;
            gap: 16px;
            padding: 28px 0;
        }

        header {
            display: flex;
            align-items: end;
            justify-content: space-between;
            gap: 16px;
            border-bottom: 1px solid var(--line);
            padding-bottom: 16px;
        }

        h1 {
            margin: 0;
            font-size: clamp(30px, 4vw, 48px);
            line-height: 1;
            letter-spacing: 0;
        }

        .status {
            min-width: 120px;
            padding: 8px 12px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.72);
            color: var(--muted);
            text-align: center;
            font: 700 13px/1.2 Verdana, sans-serif;
        }

        .chat-shell {
            min-height: 420px;
            max-height: calc(100vh - 210px);
            overflow-y: auto;
            padding: 18px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.78);
        }

        .message {
            width: fit-content;
            max-width: min(720px, 88%);
            margin: 0 0 12px;
            padding: 12px 14px;
            border: 1px solid var(--line);
            line-height: 1.45;
            white-space: pre-wrap;
        }

        .message.bot {
            background: var(--bot);
        }

        .message.user {
            margin-left: auto;
            border-color: var(--accent);
            background: var(--user);
            color: white;
        }

        .message.error {
            border-color: rgba(180, 35, 24, 0.35);
            background: #fff0ed;
            color: var(--danger);
        }

        form {
            display: grid;
            grid-template-columns: 170px 1fr auto;
            gap: 10px;
            align-items: center;
        }

        input,
        button {
            min-height: 46px;
            border: 1px solid var(--line);
            font: 15px/1.2 Verdana, sans-serif;
        }

        input {
            width: 100%;
            padding: 0 12px;
            background: var(--panel);
            color: var(--ink);
        }

        input:focus {
            outline: 2px solid rgba(15, 118, 110, 0.28);
            border-color: var(--accent);
        }

        button {
            padding: 0 18px;
            border-color: var(--accent);
            background: var(--accent);
            color: white;
            cursor: pointer;
            font-weight: 700;
        }

        button:hover {
            background: var(--accent-dark);
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        @media (max-width: 720px) {
            main {
                width: min(100vw - 20px, 980px);
                padding: 14px 0;
            }

            header {
                align-items: start;
                flex-direction: column;
            }

            form {
                grid-template-columns: 1fr;
            }

            .chat-shell {
                max-height: calc(100vh - 260px);
            }
        }
    </style>
</head>
<body>
<main>
    <header>
        <div>
            <h1>TalentConnect Chatbot</h1>
        </div>
        <div class="status" id="status">Checking</div>
    </header>

    <section class="chat-shell" id="messages" aria-live="polite">
        <div class="message bot">Bonjour. Posez une question sur les offres, les candidatures, la carriere ou le support.</div>
    </section>

    <form id="chat-form">
        <input id="user-id" name="userId" value="test-user" maxlength="100" aria-label="User id">
        <input id="message" name="message" placeholder="Ecrivez votre message..." maxlength="2000" autocomplete="off" aria-label="Message">
        <button id="send-button" type="submit">Envoyer</button>
    </form>
</main>

<script type="module">
    const statusEl = document.querySelector("#status");
    const messagesEl = document.querySelector("#messages");
    const form = document.querySelector("#chat-form");
    const userIdEl = document.querySelector("#user-id");
    const messageEl = document.querySelector("#message");
    const sendButton = document.querySelector("#send-button");

    function addMessage(text, type) {
        const item = document.createElement("div");
        item.className = `message ${type}`;
        item.textContent = text;
        messagesEl.appendChild(item);
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function checkHealth() {
        try {
            const response = await fetch("/api/chatbot/health");
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            const health = await response.json();
            statusEl.textContent = health.status;
        } catch (error) {
            console.error("Health check failed:", error);
            statusEl.textContent = "OFFLINE";
            addMessage("Le service ne repond pas. Verifiez que Spring Boot est demarre.", "error");
        }
    }

    form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const userId = userIdEl.value.trim();
        const message = messageEl.value.trim();
        if (!userId || !message) {
            addMessage("User id et message sont obligatoires.", "error");
            return;
        }

        addMessage(message, "user");
        messageEl.value = "";
        sendButton.disabled = true;

        try {
            const response = await fetch("/api/chatbot/messages", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({userId, message})
            });

            if (!response.ok) {
                const problem = await response.json().catch(() => ({}));
                throw new Error(problem.detail || `HTTP ${response.status}`);
            }

            const data = await response.json();
            addMessage(`${data.response}\n\nIntent: ${data.intent}`, "bot");
        } catch (error) {
            addMessage(`Erreur: ${error.message}`, "error");
        } finally {
            sendButton.disabled = false;
            messageEl.focus();
        }
    });

    await checkHealth();
    messageEl.focus();
</script>
</body>
</html>
